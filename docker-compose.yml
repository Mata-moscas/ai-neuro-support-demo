services:
  # --- MCP-серверы (эмуляция внутренних систем) ---

  mcp-customer-meta:
    build: ./mcp_servers/customer_meta
    ports:
      - "8001:8001"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import fastmcp; print('ok')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-billing:
    build: ./mcp_servers/billing
    ports:
      - "8002:8002"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import fastmcp; print('ok')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-incidents:
    build: ./mcp_servers/incidents
    ports:
      - "8003:8003"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import fastmcp; print('ok')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-subscriptions:
    build: ./mcp_servers/subscriptions
    ports:
      - "8004:8004"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import fastmcp; print('ok')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Основной агент (API) ---

  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MCP_CUSTOMER_META_URL: http://mcp-customer-meta:8001/mcp
      MCP_BILLING_URL: http://mcp-billing:8002/mcp
      MCP_INCIDENTS_URL: http://mcp-incidents:8003/mcp
      MCP_SUBSCRIPTIONS_URL: http://mcp-subscriptions:8004/mcp
      CHROMA_PERSIST_DIR: /app/chroma_data
      INSTRUCTIONS_PATH: /app/materials/Instructions.json
    depends_on:
      mcp-customer-meta:
        condition: service_healthy
      mcp-billing:
        condition: service_healthy
      mcp-incidents:
        condition: service_healthy
      mcp-subscriptions:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_data

volumes:
  chroma_data:
