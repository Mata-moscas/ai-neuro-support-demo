<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Neuro Support</title>
<style>
:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --primary: #e1251b;
  --primary-light: #fff1f0;
  --text: #1a1a1a;
  --text-muted: #666;
  --border: #e0e0e0;
  --step-search: #e8f4fd;
  --step-call: #fff8e1;
  --step-result: #e8f5e9;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: var(--primary);
  color: white;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

header h1 { font-size: 18px; font-weight: 600; }

.settings {
  padding: 12px 24px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.settings label { font-size: 13px; color: var(--text-muted); }

.settings input, .settings select {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
}

.settings input:focus, .settings select:focus {
  border-color: var(--primary);
}

.chat-area {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  max-width: 85%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  background: var(--primary);
  color: white;
  padding: 12px 16px;
  border-radius: var(--radius) var(--radius) 4px var(--radius);
}

.message.assistant {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
}

.message.assistant .answer {
  padding: 16px;
  line-height: 1.6;
  white-space: pre-wrap;
}

/* Промежуточные шаги */
.steps { border-bottom: 1px solid var(--border); }

.step {
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.3s ease;
}

.step:last-child { border-bottom: none; }

.step-header {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}

.step-header:hover { background: rgba(0,0,0,0.02); }

.step-header .icon { font-size: 16px; }
.step-header .chevron { margin-left: auto; transition: transform 0.2s; font-size: 12px; }
.step-header.expanded .chevron { transform: rotate(90deg); }

.step-body {
  display: none;
  padding: 0 16px 12px 40px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 300px;
  overflow-y: auto;
}

.step-body.open { display: block; }

.step.file-search .step-header { background: var(--step-search); }
.step.function-call .step-header { background: var(--step-call); }
.step.function-result .step-header { background: var(--step-result); }

/* Индикатор загрузки */
.loading {
  align-self: flex-start;
  padding: 16px;
  display: flex;
  gap: 6px;
  animation: fadeIn 0.3s ease;
}

.loading .dot {
  width: 8px;
  height: 8px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}

.loading .dot:nth-child(2) { animation-delay: 0.2s; }
.loading .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* Ввод */
.input-area {
  padding: 16px 24px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
}

.input-area textarea {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.4;
}

.input-area textarea:focus { border-color: var(--primary); }

.input-area button {
  padding: 12px 24px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.input-area button:hover { opacity: 0.9; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Пустое состояние */
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 15px;
  text-align: center;
  padding: 40px;
  line-height: 1.6;
}
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <h1>AI Neuro Support — Агент поддержки</h1>
</header>

<div class="settings">
  <label>Телефон клиента:</label>
  <input type="text" id="phone" value="79001234567" placeholder="79001234567">
  <label>Формат:</label>
  <select id="format">
    <option value="text">Текст (черновик)</option>
    <option value="json">JSON (НейроСаппорт)</option>
  </select>
</div>

<div class="chat-area" id="chat">
  <div class="empty-state" id="emptyState">
    Задайте вопрос от имени клиента.<br>
    Агент найдёт сценарий, соберёт данные и подготовит ответ.
  </div>
</div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="Введите вопрос клиента..." onkeydown="handleKey(event)"></textarea>
  <button id="sendBtn" onclick="send()">Отправить</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const emptyState = document.getElementById('emptyState');

let conversationId = null;

// Авто-высота textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function addMessage(role, content) {
  if (emptyState) emptyState.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;

  if (role === 'user') {
    div.textContent = content;
  } else {
    div.innerHTML = content;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showLoading() {
  if (emptyState) emptyState.remove();
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loading';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

function toggleStep(header) {
  header.classList.toggle('expanded');
  header.nextElementSibling.classList.toggle('open');
}

function renderSteps(steps) {
  if (!steps || steps.length === 0) return '';

  let html = '<div class="steps">';

  for (const step of steps) {
    if (step.type === 'file_search') {
      const count = step.results ? step.results.length : 0;
      const queries = step.queries ? step.queries.join(', ') : '';
      let body = `Запрос: ${queries}\nНайдено результатов: ${count}\n\n`;
      if (step.results) {
        for (const r of step.results) {
          body += `📄 ${r.filename} (score: ${r.score?.toFixed(2) || '?'})\n`;
          body += `${r.text || ''}\n\n`;
        }
      }
      html += `
        <div class="step file-search">
          <div class="step-header" onclick="toggleStep(this)">
            <span class="icon">🔍</span>
            Поиск по базе знаний: ${count} результат(ов)
            <span class="chevron">▶</span>
          </div>
          <div class="step-body">${escapeHtml(body)}</div>
        </div>`;

    } else if (step.type === 'function_call') {
      let argsFormatted = step.arguments || '{}';
      try { argsFormatted = JSON.stringify(JSON.parse(argsFormatted), null, 2); } catch {}
      html += `
        <div class="step function-call">
          <div class="step-header" onclick="toggleStep(this)">
            <span class="icon">⚙️</span>
            Вызов: ${step.name}
            <span class="chevron">▶</span>
          </div>
          <div class="step-body">${escapeHtml(argsFormatted)}</div>
        </div>`;

    } else if (step.type === 'function_result') {
      const resultStr = JSON.stringify(step.result, null, 2);
      html += `
        <div class="step function-result">
          <div class="step-header" onclick="toggleStep(this)">
            <span class="icon">✅</span>
            Результат: ${step.name}
            <span class="chevron">▶</span>
          </div>
          <div class="step-body">${escapeHtml(resultStr)}</div>
        </div>`;
    }
  }

  html += '</div>';
  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  const phone = document.getElementById('phone').value.trim();
  const fmt = document.getElementById('format').value;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text);
  showLoading();

  try {
    const body = conversationId
      ? { message: text, conversation_id: conversationId }
      : { question: text, phone_number: phone, response_format: fmt };

    const endpoint = conversationId ? '/api/continue' : '/api/ask';

    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(err);
    }

    const data = await resp.json();

    hideLoading();

    const stepsHtml = renderSteps(data.steps || []);
    const answerHtml = `<div class="answer">${escapeHtml(data.answer || '')}</div>`;
    addMessage('assistant', stepsHtml + answerHtml);

    if (data.response_id) {
      conversationId = data.response_id;
    }

  } catch (err) {
    hideLoading();
    addMessage('assistant', `<div class="answer" style="color:red">Ошибка: ${escapeHtml(err.message)}</div>`);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
